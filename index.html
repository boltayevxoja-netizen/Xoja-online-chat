<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <style>
    body { background: radial-gradient(circle, #1a1a2e, #16213e); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; height: 100vh; margin: 0; align-items: center; }
    #chat-container { width: 95%; max-width: 400px; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); padding: 20px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    #box { height: 350px; overflow-y: auto; padding: 10px; margin-bottom: 15px; display: flex; flex-direction: column; scroll-behavior: smooth; }
    #box::-webkit-scrollbar { width: 5px; }
    #box::-webkit-scrollbar-thumb { background: #1D9E75; border-radius: 10px; }
    .bubble { background: #1D9E75; padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; align-self: flex-start; max-width: 80%; animation: slideIn 0.3s ease; }
    #inp { background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; padding: 12px; width: 65%; border-radius: 12px; outline: none; }
    button { background: #1D9E75; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 12px; width: 25%; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>
    <div id="chat-container">
        <div id="box"></div>
        <input id="inp" type="text" placeholder="Xabar yozing...">
        <button onclick="send()">Jo'natish</button>
    </div>

    <script>
        async function send() {
            let inp = document.getElementById('inp');
            if(!inp.value.trim()) return;
            await fetch('/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: inp.value})
            });
            inp.value = '';
        }
        async function update() {
            let res = await fetch('/messages');
            let data = await res.json();
            document.getElementById('box').innerHTML = data.messages.map(m => `<div class="bubble">${m}</div>`).join('');
        }
        setInterval(update, 1000);
    </script>
</body>
</html>
