<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; margin: 0; }
        .chat-main { display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: auto; background: #1e1e1e; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg-row { margin-bottom: 15px; display: flex; flex-direction: column; }
        .msg-row.me { align-items: flex-end; }
        .bubble { padding: 10px 15px; border-radius: 15px; background: #333; max-width: 80%; }
        .bubble.right { background: #1D9E75; color: white; }
        .sender-name { font-size: 10px; color: #888; margin-bottom: 2px; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: #2c2c2c; }
        #msgInput { flex: 1; background: #3d3d3d; border: none; color: white; padding: 10px; border-radius: 20px; outline: none; }
        #sendBtn { background: #1D9E75; border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-main">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Xabar yozing...">
            <button id="sendBtn">Jo'natish</button>
        </div>
    </div>

    <script>
        const myId = "user_" + Math.floor(Math.random() * 10000);
        // Dinamik WebSocket ulanishi (HTTPS/HTTP uchun avtomatik sozlanadi)
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${protocol}://${window.location.host}/ws/${myId}`);
        const msgBox = document.getElementById('messages');

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const isMe = data.sender === myId;
            msgBox.innerHTML += `
                <div class="msg-row ${isMe ? 'me' : ''}">
                    <div class="sender-name">${isMe ? "Siz" : "Foydalanuvchi"}</div>
                    <div class="bubble ${isMe ? 'right' : ''}">${data.text}</div>
                </div>`;
            msgBox.scrollTop = msgBox.scrollHeight;
        };

        function sendMessage() {
            const inp = document.getElementById('msgInput');
            if (!inp.value.trim()) return;
            ws.send(inp.value);
            inp.value = '';
        }

        document.getElementById('sendBtn').onclick = sendMessage;
    </script>
</body>
</html>
