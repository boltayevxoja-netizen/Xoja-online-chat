<!DOCTYPE html>
<html>
<body>
    <div id="box" style="height: 300px; border: 1px solid #ccc; overflow-y: scroll;"></div>
    <input id="inp" type="text"><button onclick="send()">Jo'natish</button>

    <script>
        async function send() {
            let val = document.getElementById('inp').value;
            await fetch('/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: val})
            });
            document.getElementById('inp').value = '';
        }

        async function update() {
            let res = await fetch('/messages');
            let data = await res.json();
            document.getElementById('box').innerHTML = data.messages.map(m => `<div>${m}</div>`).join('');
        }
        setInterval(update, 1000);
    </script>
</body>
</html>
